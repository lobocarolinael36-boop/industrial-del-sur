<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Fondo -->
  <rect width="1100" height="720" fill="#f4f6fa"/>

  <!-- Título -->
  <rect x="0" y="0" width="1100" height="54" fill="#1E3A5F"/>
  <text x="550" y="33" text-anchor="middle" fill="white" font-size="20" font-weight="bold">DIAGRAMA ENTIDAD-RELACIÓN — Sistema Industrial del Sur</text>
  <text x="550" y="48" text-anchor="middle" fill="#93C5FD" font-size="11">Autora: Carolina Lobo | Desarrollo de Sistemas | 2026</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ENTIDAD: CLIENTE -->
  <!-- ══════════════════════════════════════════════════ -->
  <g id="cliente">
    <!-- Header -->
    <rect x="40" y="100" width="200" height="32" rx="6" ry="6" fill="#1E3A5F"/>
    <text x="140" y="121" text-anchor="middle" fill="white" font-size="13" font-weight="bold">CLIENTE</text>
    <!-- Body -->
    <rect x="40" y="132" width="200" height="168" rx="0" ry="0" fill="white" stroke="#1E3A5F" stroke-width="2"/>
    <rect x="40" y="132" width="200" height="2" fill="#1E3A5F"/>
    <!-- PK -->
    <rect x="40" y="134" width="200" height="24" fill="#DBEAFE"/>
    <text x="55" y="150" fill="#1E3A5F" font-size="12" font-weight="bold">🔑 ID</text>
    <text x="200" y="150" text-anchor="end" fill="#555" font-size="10">INTEGER (PK)</text>
    <!-- Fields -->
    <line x1="40" y1="158" x2="240" y2="158" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="173" fill="#333" font-size="11">Nombre</text>
    <text x="235" y="173" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="40" y1="178" x2="240" y2="178" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="193" fill="#333" font-size="11">Apellido</text>
    <text x="235" y="193" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="40" y1="198" x2="240" y2="198" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="213" fill="#333" font-size="11">DNI</text>
    <text x="235" y="213" text-anchor="end" fill="#888" font-size="10">TEXT (único)</text>
    <line x1="40" y1="218" x2="240" y2="218" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="233" fill="#333" font-size="11">Dirección</text>
    <text x="235" y="233" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="40" y1="238" x2="240" y2="238" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="253" fill="#333" font-size="11">Estado</text>
    <text x="235" y="253" text-anchor="end" fill="#888" font-size="10">ACTIVO / BAJA</text>
    <!-- Border bottom -->
    <rect x="40" y="298" width="200" height="2" fill="#1E3A5F"/>
    <rect x="40" y="100" width="2" height="200" fill="#1E3A5F"/>
    <rect x="238" y="100" width="2" height="200" fill="#1E3A5F"/>
  </g>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ENTIDAD: FACTURA -->
  <!-- ══════════════════════════════════════════════════ -->
  <g id="factura">
    <rect x="390" y="80" width="200" height="32" rx="6" ry="6" fill="#2563EB"/>
    <text x="490" y="101" text-anchor="middle" fill="white" font-size="13" font-weight="bold">FACTURA</text>
    <rect x="390" y="112" width="200" height="168" fill="white" stroke="#2563EB" stroke-width="2"/>
    <rect x="390" y="112" width="200" height="2" fill="#2563EB"/>
    <!-- PK -->
    <rect x="390" y="114" width="200" height="24" fill="#DBEAFE"/>
    <text x="405" y="130" fill="#1E3A5F" font-size="12" font-weight="bold">🔑 Nro_Factura</text>
    <text x="585" y="130" text-anchor="end" fill="#555" font-size="10">TEXT (PK)</text>
    <!-- FK -->
    <line x1="390" y1="138" x2="590" y2="138" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="390" y="138" width="200" height="22" fill="#EFF6FF"/>
    <text x="405" y="153" fill="#2563EB" font-size="11" font-style="italic">🔗 DNI_Cliente</text>
    <text x="585" y="153" text-anchor="end" fill="#888" font-size="10">FK → CLIENTE</text>
    <!-- Fields -->
    <line x1="390" y1="160" x2="590" y2="160" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="175" fill="#333" font-size="11">Fecha</text>
    <text x="585" y="175" text-anchor="end" fill="#888" font-size="10">DATETIME</text>
    <line x1="390" y1="180" x2="590" y2="180" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="195" fill="#333" font-size="11">Nombre_Cliente</text>
    <text x="585" y="195" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="390" y1="200" x2="590" y2="200" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="215" fill="#333" font-size="11">Dirección_Cliente</text>
    <text x="585" y="215" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="390" y1="220" x2="590" y2="220" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="235" fill="#333" font-size="11">Total</text>
    <text x="585" y="235" text-anchor="end" fill="#888" font-size="10">INTEGER</text>
    <rect x="390" y="278" width="200" height="2" fill="#2563EB"/>
    <rect x="390" y="80" width="2" height="200" fill="#2563EB"/>
    <rect x="588" y="80" width="2" height="200" fill="#2563EB"/>
  </g>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ENTIDAD: DETALLE_FACTURA -->
  <!-- ══════════════════════════════════════════════════ -->
  <g id="detalle">
    <rect x="390" y="390" width="200" height="32" rx="6" ry="6" fill="#16A34A"/>
    <text x="490" y="411" text-anchor="middle" fill="white" font-size="13" font-weight="bold">DETALLE_FACTURA</text>
    <rect x="390" y="422" width="200" height="168" fill="white" stroke="#16A34A" stroke-width="2"/>
    <rect x="390" y="422" width="200" height="2" fill="#16A34A"/>
    <!-- FK1 -->
    <rect x="390" y="424" width="200" height="22" fill="#DCFCE7"/>
    <text x="405" y="439" fill="#16A34A" font-size="11" font-style="italic">🔗 Nro_Factura</text>
    <text x="585" y="439" text-anchor="end" fill="#888" font-size="10">FK → FACTURA</text>
    <!-- FK2 -->
    <line x1="390" y1="446" x2="590" y2="446" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="390" y="446" width="200" height="22" fill="#DCFCE7"/>
    <text x="405" y="461" fill="#16A34A" font-size="11" font-style="italic">🔗 ID_Producto</text>
    <text x="585" y="461" text-anchor="end" fill="#888" font-size="10">FK → PRODUCTO</text>
    <!-- Fields -->
    <line x1="390" y1="468" x2="590" y2="468" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="483" fill="#333" font-size="11">Detalle_Producto</text>
    <text x="585" y="483" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="390" y1="488" x2="590" y2="488" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="503" fill="#333" font-size="11">Cantidad</text>
    <text x="585" y="503" text-anchor="end" fill="#888" font-size="10">INTEGER</text>
    <line x1="390" y1="508" x2="590" y2="508" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="523" fill="#333" font-size="11">Precio_Unitario</text>
    <text x="585" y="523" text-anchor="end" fill="#888" font-size="10">INTEGER</text>
    <line x1="390" y1="528" x2="590" y2="528" stroke="#e5e7eb" stroke-width="1"/>
    <text x="405" y="543" fill="#333" font-size="11">Subtotal</text>
    <text x="585" y="543" text-anchor="end" fill="#888" font-size="10">INTEGER</text>
    <rect x="390" y="588" width="200" height="2" fill="#16A34A"/>
    <rect x="390" y="390" width="2" height="200" fill="#16A34A"/>
    <rect x="588" y="390" width="2" height="200" fill="#16A34A"/>
  </g>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ENTIDAD: PRODUCTO -->
  <!-- ══════════════════════════════════════════════════ -->
  <g id="producto">
    <rect x="780" y="390" width="200" height="32" rx="6" ry="6" fill="#D97706"/>
    <text x="880" y="411" text-anchor="middle" fill="white" font-size="13" font-weight="bold">PRODUCTO</text>
    <rect x="780" y="422" width="200" height="168" fill="white" stroke="#D97706" stroke-width="2"/>
    <rect x="780" y="422" width="200" height="2" fill="#D97706"/>
    <rect x="780" y="424" width="200" height="24" fill="#FEF3C7"/>
    <text x="795" y="440" fill="#92400E" font-size="12" font-weight="bold">🔑 ID</text>
    <text x="975" y="440" text-anchor="end" fill="#555" font-size="10">INTEGER (PK)</text>
    <line x1="780" y1="448" x2="980" y2="448" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="463" fill="#333" font-size="11">Detalle</text>
    <text x="975" y="463" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="780" y1="468" x2="980" y2="468" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="483" fill="#333" font-size="11">Talle</text>
    <text x="975" y="483" text-anchor="end" fill="#888" font-size="10">XS/S/M/L/XL/XXL</text>
    <line x1="780" y1="488" x2="980" y2="488" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="503" fill="#333" font-size="11">Color</text>
    <text x="975" y="503" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="780" y1="508" x2="980" y2="508" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="523" fill="#333" font-size="11">Precio</text>
    <text x="975" y="523" text-anchor="end" fill="#888" font-size="10">INTEGER</text>
    <line x1="780" y1="528" x2="980" y2="528" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="543" fill="#333" font-size="11">Estado</text>
    <text x="975" y="543" text-anchor="end" fill="#888" font-size="10">ACTIVO / BAJA</text>
    <rect x="780" y="588" width="200" height="2" fill="#D97706"/>
    <rect x="780" y="390" width="2" height="200" fill="#D97706"/>
    <rect x="978" y="390" width="2" height="200" fill="#D97706"/>
  </g>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ENTIDAD: PROVEEDOR -->
  <!-- ══════════════════════════════════════════════════ -->
  <g id="proveedor">
    <rect x="780" y="100" width="200" height="32" rx="6" ry="6" fill="#7C3AED"/>
    <text x="880" y="121" text-anchor="middle" fill="white" font-size="13" font-weight="bold">PROVEEDOR</text>
    <rect x="780" y="132" width="200" height="168" fill="white" stroke="#7C3AED" stroke-width="2"/>
    <rect x="780" y="132" width="200" height="2" fill="#7C3AED"/>
    <rect x="780" y="134" width="200" height="24" fill="#EDE9FE"/>
    <text x="795" y="150" fill="#5B21B6" font-size="12" font-weight="bold">🔑 ID</text>
    <text x="975" y="150" text-anchor="end" fill="#555" font-size="10">INTEGER (PK)</text>
    <line x1="780" y1="158" x2="980" y2="158" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="173" fill="#333" font-size="11">Razón Social</text>
    <text x="975" y="173" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="780" y1="178" x2="980" y2="178" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="193" fill="#333" font-size="11">CUIT</text>
    <text x="975" y="193" text-anchor="end" fill="#888" font-size="10">TEXT (único)</text>
    <line x1="780" y1="198" x2="980" y2="198" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="213" fill="#333" font-size="11">Rubro</text>
    <text x="975" y="213" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="780" y1="218" x2="980" y2="218" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="233" fill="#333" font-size="11">Contacto</text>
    <text x="975" y="233" text-anchor="end" fill="#888" font-size="10">TEXT</text>
    <line x1="780" y1="238" x2="980" y2="238" stroke="#e5e7eb" stroke-width="1"/>
    <text x="795" y="253" fill="#333" font-size="11">Estado</text>
    <text x="975" y="253" text-anchor="end" fill="#888" font-size="10">ACTIVO / BAJA</text>
    <rect x="780" y="298" width="200" height="2" fill="#7C3AED"/>
    <rect x="780" y="100" width="2" height="200" fill="#7C3AED"/>
    <rect x="978" y="100" width="2" height="200" fill="#7C3AED"/>
  </g>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- RELACIONES -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- CLIENTE (1) ------ (N) FACTURA -->
  <!-- Línea de CLIENTE (derecha, centro) a FACTURA (izquierda, centro) -->
  <line x1="240" y1="196" x2="390" y2="196" stroke="#1E3A5F" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Cardinalidad 1 lado CLIENTE -->
  <text x="255" y="190" fill="#1E3A5F" font-size="14" font-weight="bold">1</text>
  <!-- Cardinalidad N lado FACTURA -->
  <text x="368" y="190" fill="#1E3A5F" font-size="14" font-weight="bold">N</text>
  <!-- Etiqueta relación -->
  <rect x="282" y="183" width="76" height="18" rx="4" fill="#DBEAFE"/>
  <text x="320" y="196" text-anchor="middle" fill="#1E3A5F" font-size="10" font-weight="bold">realiza</text>

  <!-- FACTURA (1) ------ (N) DETALLE_FACTURA -->
  <line x1="490" y1="280" x2="490" y2="390" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="498" y="300" fill="#2563EB" font-size="14" font-weight="bold">1</text>
  <text x="498" y="378" fill="#2563EB" font-size="14" font-weight="bold">N</text>
  <rect x="455" y="328" width="72" height="18" rx="4" fill="#DBEAFE"/>
  <text x="491" y="341" text-anchor="middle" fill="#2563EB" font-size="10" font-weight="bold">contiene</text>

  <!-- DETALLE_FACTURA (N) ------ (1) PRODUCTO -->
  <line x1="590" y1="490" x2="780" y2="490" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="600" y="484" fill="#16A34A" font-size="14" font-weight="bold">N</text>
  <text x="760" y="484" fill="#16A34A" font-size="14" font-weight="bold">1</text>
  <rect x="653" y="478" width="74" height="18" rx="4" fill="#DCFCE7"/>
  <text x="690" y="491" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold">referencia</text>

  <!-- PROVEEDOR (independiente) - nota -->
  <rect x="755" y="315" width="250" height="50" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="880" y="335" text-anchor="middle" fill="#5B21B6" font-size="11" font-weight="bold">⚠ Entidad independiente</text>
  <text x="880" y="353" text-anchor="middle" fill="#7C3AED" font-size="10">Sin relación directa en los archivos actuales</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- LEYENDA -->
  <!-- ══════════════════════════════════════════════════ -->
  <rect x="40" y="640" width="1020" height="60" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="60" y="662" fill="#1E3A5F" font-size="11" font-weight="bold">LEYENDA:</text>
  <!-- PK -->
  <rect x="120" y="650" width="12" height="12" fill="#DBEAFE" stroke="#1E3A5F" stroke-width="1"/>
  <text x="136" y="661" fill="#333" font-size="10">🔑 Clave Primaria (PK)</text>
  <!-- FK -->
  <rect x="270" y="650" width="12" height="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="286" y="661" fill="#333" font-size="10">🔗 Clave Foránea (FK)</text>
  <!-- Relación -->
  <line x1="420" y1="656" x2="460" y2="656" stroke="#555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="468" y="661" fill="#333" font-size="10">Relación</text>
  <!-- Cardinalidad -->
  <text x="560" y="661" fill="#333" font-size="10">1 — uno   |   N — muchos</text>
  <!-- Almacenamiento -->
  <text x="720" y="661" fill="#888" font-size="10">Almacenamiento: archivos .txt con separador "|"</text>

  <text x="60" y="686" fill="#555" font-size="10">Archivo: clientes.txt · proveedores.txt · productos.txt · facturas_emitidas/*.txt</text>
</svg>
